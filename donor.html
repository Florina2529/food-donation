<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f5f5;}.card{border:none;border-radius:12px;}</style>
</head>
<body>
<div id="mainNav"></div>
<div class="container mt-5">
  <h2 class="text-center text-success mb-4" id="dTitle">Donor Dashboard</h2>
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><button class="nav-link active" onclick="showTab('tDonate')">Donate Food</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('tMine')">My Donations</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('tReqs')">NGO Requests</button></li>
  </ul>

  <div id="tDonate">
    <div class="card shadow p-4" style="max-width:600px;margin:auto;">
      <h5 class="mb-3">Submit a Donation</h5>
      <div class="mb-3"><label class="form-label">Food Name *</label><input type="text" id="foodName" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Quantity *</label><input type="number" id="foodQty" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Expiry Time</label><input type="datetime-local" id="expiryTime" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Pickup Address</label><textarea id="address" class="form-control" rows="2"></textarea></div>
      <div class="mb-3"><label class="form-label">Contact Number</label><input type="tel" id="contact" class="form-control"></div>
      <div id="dErr" class="text-danger mb-2" style="display:none;">Fill required fields.</div>
      <div id="dOk" class="text-success mb-2" style="display:none;">✅ Donation submitted!</div>
      <button class="btn btn-success px-4" onclick="submitDonation()">Submit Donation</button>
    </div>
  </div>

  <div id="tMine" style="display:none;">
    <div id="noMine" class="text-muted text-center py-4" style="display:none;">No donations yet.</div>
    <div class="table-responsive">
      <table class="table table-striped align-middle" id="myTable">
        <thead class="table-success"><tr><th>#</th><th>Food</th><th>Qty</th><th>Submitted</th><th>Status</th><th>Accepted By</th></tr></thead>
        <tbody id="myBody"></tbody>
      </table>
    </div>
  </div>

  <div id="tReqs" style="display:none;">
    <div class="row" id="reqCards"></div>
    <div id="noReqs" class="text-muted text-center py-4" style="display:none;">No NGO requests.</div>
  </div>
</div>

<footer class="bg-success text-white text-center p-3 mt-5">© 2026 Smart Sustainable Food Donation Platform</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
buildNav('donor');
var u=currentUser();
if(!u||u.role!=='donor'){window.location.href='login.html';}
document.getElementById('dTitle').textContent=u.name+' – Dashboard';

function showTab(id){
  ['tDonate','tMine','tReqs'].forEach(function(t){document.getElementById(t).style.display=t===id?'':'none';});
  document.querySelectorAll('.nav-tabs .nav-link').forEach(function(b){b.classList.toggle('active',b.getAttribute('onclick').includes(id));});
  if(id==='tMine')loadMine();
  if(id==='tReqs')loadReqs();
}

function submitDonation(){
  document.getElementById('dErr').style.display='none';
  document.getElementById('dOk').style.display='none';
  var food=document.getElementById('foodName').value.trim();
  var qty=document.getElementById('foodQty').value.trim();
  if(!food||!qty){document.getElementById('dErr').style.display='';return;}
  var list=Store.load('donations');
  list.push({id:Date.now(),donorEmail:u.email,donorName:u.name,foodName:food,quantity:qty,
    expiryTime:document.getElementById('expiryTime').value,
    address:document.getElementById('address').value,
    contact:document.getElementById('contact').value,
    submittedAt:new Date().toLocaleString(),status:'Pending',acceptedBy:null});
  Store.save('donations',list);
  document.getElementById('dOk').style.display='';
  ['foodName','foodQty','expiryTime','address','contact'].forEach(function(i){document.getElementById(i).value='';});
}

var badges={Pending:'bg-secondary',Accepted:'bg-warning text-dark',Rejected:'bg-danger',Completed:'bg-success'};

function loadMine(){
  // match by email OR donorName (covers old donations saved without email)
  var list=Store.load('donations').filter(function(d){
    return d.donorEmail===u.email || d.donorName===u.name;
  });
  var tb=document.getElementById('myBody');tb.innerHTML='';
  var noMine=document.getElementById('noMine');
  var myTable=document.getElementById('myTable');
  if(!list.length){noMine.style.display='';myTable.style.display='none';return;}
  noMine.style.display='none';myTable.style.display='';
  list.forEach(function(d,i){
    var b=badges[d.status]||'bg-secondary';
    tb.innerHTML+='<tr><td>'+(i+1)+'</td><td>'+esc(d.foodName)+'</td><td>'+esc(d.quantity)+'</td>'+
      '<td>'+esc(d.submittedAt)+'</td><td><span class="badge '+b+'">'+esc(d.status)+'</span></td>'+
      '<td>'+esc(d.acceptedBy||'-')+'</td></tr>';
  });
}

function loadReqs(){
  var reqs=Store.load('requests').filter(function(r){return r.status==='open';});
  var cont=document.getElementById('reqCards');cont.innerHTML='';
  document.getElementById('noReqs').style.display=reqs.length?'none':'';
  reqs.forEach(function(r){
    cont.innerHTML+='<div class="col-md-4 mb-4"><div class="card shadow p-3">'+
      '<h5>'+esc(r.foodType)+'</h5><p><b>NGO:</b> '+esc(r.ngoName)+'</p>'+
      '<p><b>Qty:</b> '+esc(r.quantity)+'</p><p><b>Location:</b> '+esc(r.location)+'</p>'+
      (r.note?'<p class="text-muted small">'+esc(r.note)+'</p>':'')+
      '<button class="btn btn-success btn-sm" onclick="showTab(\'tDonate\')">Donate Now</button></div></div>';
  });
}
</script>
</body></html>
