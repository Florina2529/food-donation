<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f5f5;}.contact-header{background:#e8f5e9;padding:60px;text-align:center;}.contact-header h1{color:#2E7D32;}</style>
</head>
<body>
<div id="mainNav"></div>


<div class="contact-header">
  <h1>Contact Us</h1>
  <p>We would love to hear from you</p>
</div>

<div class="container mt-5">
  <div class="row">
    <div class="col-md-6 mb-4">
      <h3>Send a Message</h3>
      <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="5"></textarea></div>
      <button class="btn btn-success" onclick="alert('Message sent! We will get back to you soon.')">Send Message</button>
    </div>
    <div class="col-md-6">
      <h3>Contact Information</h3>
      <p><strong>Email:</strong> support@fooddonation.com</p>
      <p><strong>Phone:</strong> +91 9876543210</p>
      <p><strong>Address:</strong> Chennai, Tamil Nadu</p>
      <h4 class="mt-4">Working Hours</h4>
      <p>Monday – Saturday: 9:00 AM – 6:00 PM</p>
    </div>
  </div>
</div>

<footer class="bg-success text-white text-center p-3 mt-5">
  © 2026 Smart Sustainable Food Donation Platform
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>buildNav("");</script>
</body>
</html>
