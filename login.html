<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#e8f5e9;}.box{max-width:420px;margin:60px auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 0 15px rgba(0,0,0,0.15);}h2{color:#2E7D32;text-align:center;}</style>
</head>
<body>
<div id="mainNav"></div>
<div class="box">
  <h2>🔐 Login</h2>
  <p class="text-center text-muted small">Admin: admin / admin123</p>
  <div class="mb-3"><label class="form-label">Role</label>
    <select id="role" class="form-select">
      <option value="admin">Admin</option>
      <option value="ngo">NGO</option>
      <option value="donor">Donor</option>
    </select>
  </div>
  <div class="mb-3"><label class="form-label">Username / Email</label><input type="text" id="username" class="form-control"></div>
  <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control"></div>
  <div id="err" class="text-danger mb-2" style="display:none;"></div>
  <button onclick="doLogin()" class="btn btn-success w-100">Login</button>
  <p class="text-center mt-3 mb-0"><a href="register.html">Register as NGO or Donor</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
buildNav('login');
function err(m){var e=document.getElementById('err');e.textContent=m;e.style.display='';}
function doLogin(){
  var role=document.getElementById('role').value;
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value.trim();
  document.getElementById('err').style.display='none';
  if(!u||!p){err('Please fill in all fields.');return;}
  if(role==='admin'){
    if(u==='admin'&&p==='admin123'){Store.set('currentUser',{role:'admin',name:'Admin'});window.location.href='admin.html';}
    else err('Invalid admin credentials.');
    return;
  }
  if(role==='ngo'){
    var list=Store.load('ngos');
    var ngo=null;
    for(var i=0;i<list.length;i++){if(list[i].username===u&&list[i].password===p){ngo=list[i];break;}}
    if(!ngo){err('NGO not found. Check username and password.');return;}
    if(ngo.status==='pending'){err('Account pending admin approval.');return;}
    if(ngo.status==='rejected'){err('Account rejected by admin.');return;}
    Store.set('currentUser',{role:'ngo',name:ngo.orgName,username:ngo.username,id:ngo.id});
    window.location.href='ngo.html';return;
  }
  if(role==='donor'){
    var list=Store.load('donors');
    var donor=null;
    for(var i=0;i<list.length;i++){if(list[i].email===u&&list[i].password===p){donor=list[i];break;}}
    if(!donor){err('Donor not found. Check email and password.');return;}
    Store.set('currentUser',{role:'donor',name:donor.name,email:donor.email,id:donor.id});
    window.location.href='donor.html';return;
  }
}
document.getElementById('password').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
</script>
</body></html>
