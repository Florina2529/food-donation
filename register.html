<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#e8f5e9;}.box{max-width:520px;margin:50px auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,0.2);}h2{color:#2E7D32;text-align:center;}</style>
</head>
<body>
<div id="mainNav"></div>
<div class="box">
  <h2>Register</h2>
  <div class="mb-3"><label class="form-label">Register As</label>
    <select id="regRole" class="form-select" onchange="toggleFields()">
      <option value="donor">Donor</option>
      <option value="ngo">NGO</option>
    </select>
  </div>
  <div id="donorFields">
    <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" id="dName" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Email *</label><input type="email" id="dEmail" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Phone</label><input type="tel" id="dPhone" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Password *</label><input type="password" id="dPass" class="form-control"></div>
  </div>
  <div id="ngoFields" style="display:none;">
    <div class="mb-3"><label class="form-label">Organisation Name *</label><input type="text" id="nOrg" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Username *</label><input type="text" id="nUser" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Email *</label><input type="email" id="nEmail" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Phone *</label><input type="tel" id="nPhone" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Password *</label><input type="password" id="nPass" class="form-control"></div>
  </div>
  <div id="err" class="text-danger mb-2" style="display:none;"></div>
  <div id="ok" class="text-success mb-2" style="display:none;"></div>
  <button class="btn btn-success w-100" onclick="doRegister()">Register</button>
  <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
buildNav('');
function toggleFields(){
  var r=document.getElementById('regRole').value;
  document.getElementById('donorFields').style.display=r==='donor'?'':'none';
  document.getElementById('ngoFields').style.display=r==='ngo'?'':'none';
}
function showErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display='';}
function showOk(m){var e=document.getElementById('ok');e.textContent=m;e.style.display='';}
function doRegister(){
  document.getElementById('err').style.display='none';
  document.getElementById('ok').style.display='none';
  var role=document.getElementById('regRole').value;
  if(role==='donor'){
    var n=document.getElementById('dName').value.trim();
    var em=document.getElementById('dEmail').value.trim().toLowerCase();
    var pw=document.getElementById('dPass').value.trim();
    if(!n||!em||!pw){showErr('Fill all required fields.');return;}
    var donors=Store.load('donors');
    for(var i=0;i<donors.length;i++){if(donors[i].email===em){showErr('Email already registered.');return;}}
    donors.push({id:Date.now(),name:n,email:em,phone:document.getElementById('dPhone').value.trim(),password:pw,createdAt:new Date().toLocaleString()});
    Store.save('donors',donors);
    showOk('Donor registered! Redirecting to login…');
    setTimeout(function(){window.location.href='login.html';},1500);
    return;
  }
  if(role==='ngo'){
    var org=document.getElementById('nOrg').value.trim();
    var uname=document.getElementById('nUser').value.trim();
    var email=document.getElementById('nEmail').value.trim().toLowerCase();
    var phone=document.getElementById('nPhone').value.trim();
    var pw2=document.getElementById('nPass').value.trim();
    if(!org||!uname||!email||!phone||!pw2){showErr('Fill all required fields.');return;}
    var ngos=Store.load('ngos');
    for(var i=0;i<ngos.length;i++){if(ngos[i].username===uname){showErr('Username already taken.');return;}}
    ngos.push({id:Date.now(),orgName:org,username:uname,email:email,phone:phone,password:pw2,status:'pending',createdAt:new Date().toLocaleString()});
    Store.save('ngos',ngos);
    showOk('NGO registered! Awaiting admin approval.');
    setTimeout(function(){window.location.href='login.html';},2000);
    return;
  }
}
</script>
</body></html>
