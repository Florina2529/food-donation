<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate Food</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f5f5;}</style>
</head>
<body>
<div id="mainNav"></div>
<div class="container mt-5" style="max-width:600px;">
  <div id="guestView" style="display:none;">
    <div class="card shadow p-5 text-center">
      <h4 class="text-success mb-3">Login Required to Donate</h4>
      <p class="text-muted">Please login or register as a donor to submit a food donation.</p>
      <a href="login.html" class="btn btn-success me-2">Login</a>
      <a href="register.html" class="btn btn-outline-success">Register</a>
    </div>
  </div>
  <div id="donorView" style="display:none;">
    <h2 class="text-center mb-4 text-success">Food Donation Form</h2>
    <div class="card shadow p-4">
      <div class="mb-3"><label class="form-label">Donor Name *</label><input type="text" id="donorName" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Food Name *</label><input type="text" id="foodName" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Quantity *</label><input type="number" id="foodQty" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Expiry Time</label><input type="datetime-local" id="expiryTime" class="form-control"></div>
      <div class="mb-3"><label class="form-label">Pickup Address</label><textarea id="address" class="form-control" rows="2"></textarea></div>
      <div class="mb-3"><label class="form-label">Contact Number</label><input type="tel" id="contact" class="form-control"></div>
      <div id="errMsg" class="text-danger mb-2" style="display:none;">Please fill required fields.</div>
      <div class="text-center"><button onclick="submitDonation()" class="btn btn-success btn-lg px-5">Submit Donation</button></div>
    </div>
  </div>
</div>
<footer class="bg-success text-white text-center p-3 mt-5">© 2026 Smart Sustainable Food Donation Platform</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
buildNav('donate');
var u=currentUser();
if(!u||u.role!=='donor'){
  document.getElementById('guestView').style.display='';
} else {
  document.getElementById('donorView').style.display='';
  document.getElementById('donorName').value=u.name;
}
function submitDonation(){
  var name=document.getElementById('donorName').value.trim();
  var food=document.getElementById('foodName').value.trim();
  var qty=document.getElementById('foodQty').value.trim();
  if(!name||!food||!qty){document.getElementById('errMsg').style.display='';return;}
  var u=currentUser();
  var d={id:Date.now(),donorName:name,donorId:u.id,foodName:food,quantity:qty,
    expiryTime:document.getElementById('expiryTime').value,
    address:document.getElementById('address').value,
    contact:document.getElementById('contact').value,
    submittedAt:new Date().toLocaleString(),status:'Pending',acceptedBy:null,acceptedAt:null};
  var list=Store.load('donations');list.push(d);Store.save('donations',list);
  window.location.href='success.html';
}
</script>
</body></html>
